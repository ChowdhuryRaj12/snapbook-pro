<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAPBOOK PRO</title>
    <link rel="stylesheet" href="style.css">
    <!-- EmailJS Script -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("lpV9dn2wXV1H-6X8j"); // আপনার Public Key
       })();
    </script>
</head>
<body>

    <div id="loader-overlay" class="hidden"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <!-- HEADER -->
    <header class="top-header hidden" id="top-header">
        <div class="header-logo">🔥 SNAPBOOK <sup style="color:gold; font-size:10px;">PRO</sup></div>
        <div class="header-icons">
            <div class="icon-btn" onclick="withLoading(() => navTo('notifications-screen'))">🔔</div>
            <div class="dropdown">
                <div class="icon-btn" onclick="toggleDropdown('side-menu', event)">☰</div>
                <div id="side-menu" class="dropdown-content">
                    <div class="menu-item" onclick="viewProfile(currentUser.id)">👤 My Profile</div>
                    <div class="menu-item" onclick="renderBookmarks()">📑 Saved Posts</div>
                    <div class="menu-item" onclick="openMonetization()">💰 Monetization</div>
                    <div class="menu-item" onclick="openVerification()">✔️ Get Verified</div>
                    <div class="menu-item" onclick="toggleTheme()">🌗 Toggle Theme</div>
                    <div class="menu-item" style="color: red;" onclick="logout()">🚪 Logout</div>
                </div>
            </div>
        </div>
    </header>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen flex-center">
        <!-- Login -->
        <div id="login-box" class="multi-step-form">
            <h1 style="color: var(--primary); font-size: 38px; font-weight: 900; margin-bottom: 5px;">SNAPBOOK</h1>
            <p style="color: gray; margin-bottom: 25px;">Connect, Share, Discover.</p>
            <input type="text" id="log-username" placeholder="Email Address">
            <input type="password" id="log-password" placeholder="Password">
            <button class="btn" onclick="withLoading(() => handleLogin())">Log In</button>
            <hr style="margin: 20px 0;">
            <button class="btn btn-outline" onclick="startSignup()">Create New Account</button>
        </div>

        <!-- Signup -->
        <div id="signup-box" class="multi-step-form hidden">
            <h3 style="margin-bottom: 15px; color: var(--primary);" id="reg-title">Sign Up - Step 1</h3>
            
            <div id="reg-step-1">
                <input type="text" id="reg-fn" placeholder="First Name">
                <input type="text" id="reg-ln" placeholder="Last Name">
                <button class="btn" onclick="nextRegStep(2)">Next</button>
            </div>
            
            <div id="reg-step-2" class="hidden">
                <input type="date" id="reg-dob">
                <button class="btn" onclick="nextRegStep(3)">Next</button>
            </div>
            
            <div id="reg-step-3" class="hidden">
                <input type="email" id="reg-contact" placeholder="Email Address (Required for OTP)">
                <input type="password" id="reg-password-new" placeholder="Create Password">
                <button class="btn" onclick="withLoading(() => sendOTP())">Send OTP</button>
            </div>

            <!-- OTP Step -->
            <div id="reg-step-4" class="hidden">
                <p style="font-size:14px; color:green; margin-bottom:10px;">OTP sent to your email!</p>
                <input type="text" id="reg-otp-input" placeholder="Enter 5-digit OTP">
                <button class="btn" onclick="withLoading(() => verifyOTPAndSignup())">Verify & Create Account</button>
            </div>

            <div style="color: gray; cursor:pointer; font-weight:bold; margin-top:20px;" onclick="cancelSignup()">Cancel</div>
        </div>
    </div>

    <!-- MAIN SCREENS -->
    <div id="feed-screen" class="screen hidden"><div class="feed-container" id="main-feed"></div></div>
    
    <div id="profile-screen" class="screen hidden">
        <div style="max-width: 600px; margin: 0 auto; background: var(--bg-color); min-height:100vh;">
            <div style="height: 180px; background: gray; position: relative;">
                <img id="profile-cover" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                <label for="upload-cover" style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer;">📷 Edit Cover</label>
                <input type="file" id="upload-cover" accept="image/*" class="hidden" onchange="triggerUploadWrapper('cover', this)">
            </div>
            <div style="padding: 0 15px; position: relative; margin-top: -50px;">
                <img id="profile-pic-large" src="" style="width:100px;height:100px;border-radius:50%;border:4px solid white;object-fit:cover;background:lightgray;">
                <label for="upload-pfp" style="position:absolute; left:80px; bottom:0; background:white; width:32px; height:32px; border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer; border:1px solid gray;">📷</label>
                <input type="file" id="upload-pfp" accept="image/*" class="hidden" onchange="triggerUploadWrapper('pfp', this)">
                <h2 id="profile-name" style="margin-top: 10px;">Name</h2>
                <p id="profile-email" style="color: gray; margin-bottom: 5px;">@email</p>
            </div>
        </div>
    </div>

    <div id="bookmarks-screen" class="screen hidden">
        <div style="max-width:600px; margin:0 auto; padding:15px;"><h3>Saved Posts</h3><div id="bookmarks-list"></div></div>
    </div>

    <!-- MODALS -->
    <div id="monetization-modal" class="modal closed"><div class="modal-body"><h3>Monetization</h3><h2 id="monetization-earnings" style="color:green;">$0.00</h2><button class="btn btn-success" onclick="closeModal('monetization-modal')">Close</button></div></div>
    
    <div id="verification-modal" class="modal closed"><div class="modal-body" id="verify-body"></div></div>

    <!-- BOTTOM NAV -->
    <nav id="bottom-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="navTo('feed-screen', this)">🏠 <br>Home</div>
        <div class="nav-item" onclick="viewProfile(currentUser.id, this)">👤 <br>Profile</div>
    </nav>

    <!-- JS Files in Order -->
    <script src="db.js"></script>
    <script src="ui.js"></script>
    <script src="auth.js"></script>
    <script src="main.js"></script>
</body>
</html>
