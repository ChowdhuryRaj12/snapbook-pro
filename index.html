<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAPBOOK PRO</title>
    <link rel="stylesheet" href="style.css">
    <!-- PWA Setup -->
    <meta name="theme-color" content="#1877F2">
</head>
<body>
    <div id="loader-overlay" class="hidden"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <!-- HEADER (Added Search Bar) -->
    <header class="top-header hidden" id="top-header">
        <div class="header-logo">🔥 SNAPBOOK <sup style="color:gold;">PRO</sup></div>
        <div class="search-bar">
            <input type="text" id="global-search" placeholder="Search users, #hashtags..." oninput="liveSearch()">
            <div id="search-results" class="search-dropdown hidden"></div>
        </div>
        <div class="header-icons">
            <div class="icon-btn" onclick="navTo('dashboard-screen')">📊</div>
            <div class="dropdown">
                <div class="icon-btn" onclick="toggleDropdown('side-menu', event)">☰</div>
                <div id="side-menu" class="dropdown-content">
                    <div class="menu-item" onclick="toggleTheme()">🌗 Toggle Theme</div>
                    <div class="menu-item" onclick="navTo('saved-screen')">📌 Saved Posts</div>
                    <div class="menu-item" style="color: red;" onclick="logout()">🚪 Logout</div>
                </div>
            </div>
        </div>
    </header>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen flex-center">
        <!-- Login Form... (Keep your existing Auth HTML here) -->
        <div id="login-box" class="form-box">
            <h1 class="brand-title">SNAPBOOK</h1>
            <input type="email" id="log-email" placeholder="Email Address">
            <input type="password" id="log-password" placeholder="Password">
            <button class="btn" onclick="handleLogin()">Log In</button>
            <p onclick="toggleAuth('signup-box')" style="color:var(--primary); cursor:pointer; margin-top:15px;">Create New Account</p>
        </div>
        <!-- Signup Form... -->
        <div id="signup-box" class="form-box hidden">
            <h2 style="color: var(--primary);">Sign Up</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-username" placeholder="@username">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-password" placeholder="Create Password">
            <button class="btn" onclick="handleSignup()">Sign Up</button>
            <p class="cancel-text" onclick="toggleAuth('login-box')">Cancel</p>
        </div>
    </div>

    <!-- 1. HOME SCREEN (Added Stories) -->
    <div id="home-screen" class="screen hidden">
        <div class="feed-container">
            <!-- Story Section -->
            <div class="story-container">
                <div class="story-item create-story">
                    <label for="story-upload">+</label>
                    <input type="file" id="story-upload" accept="image/*,video/*" class="hidden" onchange="uploadStory(this)">
                    <span>Add Story</span>
                </div>
                <div id="story-list" style="display:flex; gap:10px;"></div>
            </div>

            <!-- Create Post -->
            <div class="create-post-box">
                <textarea id="post-text" placeholder="What's on your mind? Include #hashtags!"></textarea>
                <input type="file" id="post-file" accept="image/*,video/*" class="hidden" onchange="previewUpload(this)">
                <label for="post-file" class="upload-btn">📷 Photo/Video</label>
                <button class="btn" onclick="createPost()">Post</button>
            </div>
            
            <div id="home-feed"></div>
        </div>
    </div>

    <!-- SAVED POSTS SCREEN -->
    <div id="saved-screen" class="screen hidden">
        <div class="feed-container">
            <h3>📌 Saved Posts</h3>
            <div id="saved-feed"></div>
        </div>
    </div>

    <!-- Keep other screens (Reels, Messages, Profile, Dashboard) same as before... -->

    <!-- BOTTOM NAV -->
    <nav id="bottom-bar" class="bottom-nav hidden">
        <div class="nav-item" onclick="navTo('home-screen', this)">🏠</div>
        <div class="nav-item" onclick="navTo('reels-screen', this)">📱</div>
        <div class="nav-item" onclick="navTo('message-screen', this)">💬</div>
        <div class="nav-item" onclick="navTo('notification-screen', this)">🔔</div>
        <div class="nav-item" onclick="navTo('profile-screen', this); loadProfile();">👤</div>
    </nav>

    <!-- Scripts -->
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script src="feed.js"></script>
</body>
    </html>
